<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; width:100vw; height:100vh; }
  canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  #overlay-canvas { z-index:2; pointer-events:none; }
  video { display:none; }
  #status {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    font-family:monospace; font-size:11px; color:#06b6d4;
    text-shadow:0 0 6px rgba(6,182,212,0.8); z-index:3;
    white-space:nowrap;
  }
</style>
</head><body>
<video id="video" playsinline muted autoplay></video>
<canvas id="video-canvas"></canvas>
<canvas id="overlay-canvas"></canvas>
<div id="status">SCANNING...</div>
<script>
const params = new URLSearchParams(location.search);
const GESTURE = (params.get('gesture') || 'WAVE').toUpperCase();
const REQUIRED = parseInt(params.get('frames') || '35');

const video = document.getElementById('video');
const vc = document.getElementById('video-canvas');
const oc = document.getElementById('overlay-canvas');
const vctx = vc.getContext('2d');
const octx = oc.getContext('2d');
const statusEl = document.getElementById('status');

let stream = null;
let prevData = null;
let accumulated = 0;
let running = false;
let frameCount = 0;
let scanLineY = 0;

// Zone-based motion detection
// Divide frame into 4 quadrants and track motion per zone
const ZONES = {
  topLeft:    { x1:0,    y1:0,    x2:0.5,  y2:0.5  },
  topRight:   { x1:0.5,  y1:0,    x2:1,    y2:0.5  },
  bottomLeft: { x1:0,    y1:0.5,  x2:0.5,  y2:1    },
  bottomRight:{ x1:0.5,  y1:0.5,  x2:1,    y2:1    },
  upper:      { x1:0.1,  y1:0,    x2:0.9,  y2:0.45 },
  lower:      { x1:0.1,  y1:0.55, x2:0.9,  y2:1    },
  center:     { x1:0.2,  y1:0.2,  x2:0.8,  y2:0.8  },
  left:       { x1:0,    y1:0.1,  x2:0.45, y2:0.9  },
  right:      { x1:0.55, y1:0.1,  x2:1,    y2:0.9  },
};

function zoneMotion(imageData, zone, w, h, threshold) {
  if (!prevData) return 0;
  const x1 = Math.floor(zone.x1 * w), y1 = Math.floor(zone.y1 * h);
  const x2 = Math.floor(zone.x2 * w), y2 = Math.floor(zone.y2 * h);
  let changed = 0, total = 0;
  for (let y = y1; y < y2; y += 2) {
    for (let x = x1; x < x2; x += 2) {
      const i = (y * w + x) * 4;
      const diff = Math.abs(imageData[i] - prevData[i]) +
                   Math.abs(imageData[i+1] - prevData[i+1]) +
                   Math.abs(imageData[i+2] - prevData[i+2]);
      if (diff > threshold) changed++;
      total++;
    }
  }
  return total > 0 ? changed / total : 0;
}

// Gesture-specific detection — returns 0.0 to 1.0 score per frame
function detectGesture(imageData, w, h) {
  const T = 30; // pixel diff threshold
  const g = GESTURE;

  const upper = zoneMotion(imageData.data, ZONES.upper, w, h, T);
  const lower = zoneMotion(imageData.data, ZONES.lower, w, h, T);
  const topL  = zoneMotion(imageData.data, ZONES.topLeft, w, h, T);
  const topR  = zoneMotion(imageData.data, ZONES.topRight, w, h, T);
  const botL  = zoneMotion(imageData.data, ZONES.bottomLeft, w, h, T);
  const botR  = zoneMotion(imageData.data, ZONES.bottomRight, w, h, T);
  const left  = zoneMotion(imageData.data, ZONES.left, w, h, T);
  const right = zoneMotion(imageData.data, ZONES.right, w, h, T);

  if (g.includes('WAVE') || g.includes('HAND')) {
    // Motion in upper zone and either left or right side
    if (upper > 0.06 && (left > 0.05 || right > 0.05)) return 1;
    if (upper > 0.04) return 0.5;
    return 0;
  }
  if (g.includes('SALUTE')) {
    // Upper zone motion, specifically top-left or top-right
    if (upper > 0.05 && (topL > 0.04 || topR > 0.04)) return 1;
    return 0;
  }
  if (g.includes('CLAP')) {
    // Motion in both left and right sides simultaneously
    if (left > 0.05 && right > 0.05) return 1;
    if (upper > 0.08) return 0.5;
    return 0;
  }
  if (g.includes('THUMBS')) {
    // Motion in upper quadrant
    if ((topL > 0.06 || topR > 0.06) && upper > 0.04) return 1;
    if (upper > 0.05) return 0.4;
    return 0;
  }
  if (g.includes('NOD') || g.includes('HEAD')) {
    // Up-down motion — upper zone movement
    if (upper > 0.04) return 1;
    return 0;
  }
  if (g.includes('JUMPING JACKS')) {
    // Arms up (upper) + legs (lower) motion — all 4 quadrants
    const allZones = topL + topR + botL + botR;
    if (allZones > 0.15 && upper > 0.06) return 1;
    if (upper > 0.05) return 0.4;
    return 0;
  }
  if (g.includes('SQUAT')) {
    // Lower body motion
    if (lower > 0.08) return 1;
    if (lower > 0.05) return 0.5;
    return 0;
  }
  if (g.includes('ARM CIRCLES') || g.includes('HELICOPTER')) {
    // Lateral sweeping — alternating left/right
    if ((left > 0.07 || right > 0.07) && upper > 0.04) return 1;
    if (upper > 0.06) return 0.4;
    return 0;
  }
  if (g.includes('MARCH')) {
    // Lower body + alternating motion
    if (lower > 0.06) return 1;
    if (lower > 0.03) return 0.4;
    return 0;
  }

  // Generic: any significant motion
  const total = upper + lower;
  if (total > 0.10) return 1;
  if (total > 0.05) return 0.5;
  return 0;
}

function drawScannerOverlay(w, h, motionScore) {
  octx.clearRect(0, 0, w, h);

  // Scanline
  scanLineY = (scanLineY + 3) % h;
  const grad = octx.createLinearGradient(0, scanLineY - 20, 0, scanLineY + 20);
  grad.addColorStop(0, 'rgba(6,182,212,0)');
  grad.addColorStop(0.5, 'rgba(6,182,212,0.25)');
  grad.addColorStop(1, 'rgba(6,182,212,0)');
  octx.fillStyle = grad;
  octx.fillRect(0, scanLineY - 20, w, 40);

  // Corner brackets
  const bSize = 30, bW = 3;
  octx.strokeStyle = motionScore > 0.5 ? '#10b981' : '#06b6d4';
  octx.lineWidth = bW;
  const corners = [[0,0,1,1],[w,0,-1,1],[0,h,1,-1],[w,h,-1,-1]];
  for (const [x,y,dx,dy] of corners) {
    octx.beginPath();
    octx.moveTo(x + dx*bSize, y); octx.lineTo(x, y); octx.lineTo(x, y + dy*bSize);
    octx.stroke();
  }

  // Motion heat zones
  const zones = [ZONES.upper, ZONES.lower, ZONES.left, ZONES.right];
  const zoneAlpha = Math.min(motionScore * 0.3, 0.15);
  if (zoneAlpha > 0.02) {
    octx.fillStyle = `rgba(16,185,129,${zoneAlpha})`;
    octx.fillRect(0, 0, w, h);
  }

  // REC indicator
  frameCount++;
  if (Math.floor(frameCount / 20) % 2 === 0) {
    octx.beginPath();
    octx.arc(w - 16, 14, 5, 0, Math.PI * 2);
    octx.fillStyle = '#ff2d2d';
    octx.fill();
    octx.fillStyle = '#fff';
    octx.font = '10px monospace';
    octx.fillText('REC', w - 38, 18);
  }

  // Fake landmark dots that pulse when motion detected
  if (motionScore > 0.3) {
    const dotPositions = [
      [w*0.5, h*0.15], [w*0.5, h*0.3], [w*0.3, h*0.25], [w*0.7, h*0.25],
      [w*0.25, h*0.45], [w*0.75, h*0.45], [w*0.5, h*0.5]
    ];
    octx.strokeStyle = '#10b98180';
    octx.lineWidth = 1;
    for (let i = 0; i < dotPositions.length - 1; i++) {
      octx.beginPath();
      octx.moveTo(dotPositions[i][0], dotPositions[i][1]);
      octx.lineTo(dotPositions[i+1][0], dotPositions[i+1][1]);
      octx.stroke();
    }
    dotPositions.forEach(([x, y]) => {
      octx.beginPath();
      octx.arc(x, y, 4, 0, Math.PI * 2);
      octx.fillStyle = '#10b981cc';
      octx.fill();
    });
  }
}

async function start() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width:640, height:480, facingMode:'user' }, audio:false
    });
    video.srcObject = stream;
    await video.play();
    vc.width = oc.width = video.videoWidth || 640;
    vc.height = oc.height = video.videoHeight || 480;
    running = true;
    parent.postMessage({ event:'camera-started' }, '*');
    loop();
  } catch(e) {
    parent.postMessage({ event:'camera-error', message: e.message }, '*');
  }
}

function loop() {
  if (!running) return;
  requestAnimationFrame(loop);

  const w = vc.width, h = vc.height;
  vctx.save();
  vctx.translate(w, 0); vctx.scale(-1, 1);
  vctx.drawImage(video, 0, 0, w, h);
  vctx.restore();

  const imageData = vctx.getImageData(0, 0, w, h);
  const motionScore = detectGesture(imageData, w, h);

  if (motionScore > 0) accumulated += motionScore;

  drawScannerOverlay(w, h, motionScore);

  statusEl.textContent = motionScore > 0
    ? `GESTURE DETECTED — ${Math.round(accumulated/REQUIRED*100)}%`
    : `Scanning for: ${GESTURE}`;

  prevData = imageData.data.slice();

  const progress = Math.min(accumulated / REQUIRED, 1);
  parent.postMessage({
    event:'progress', value:progress,
    detected: motionScore > 0,
    hasPose: motionScore > 0.5,
    hasHands: motionScore > 0.3,
    score: accumulated,
    gestureScore: motionScore
  }, '*');

  if (progress >= 1) {
    running = false;
    parent.postMessage({ event:'complete' }, '*');
    if (stream) stream.getTracks().forEach(t => t.stop());
  }
}

window.addEventListener('message', e => {
  if (e.data?.cmd === 'start') start();
  if (e.data?.cmd === 'stop') {
    running = false;
    if (stream) stream.getTracks().forEach(t => t.stop());
  }
});

// Auto-start unless this is just a preload warm-up ping
const isPreload = params.get('preload') === '1';
if (!isPreload) start();
</script>
</body></html>
