<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; width:100vw; height:100vh; }
  canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  #overlay-canvas { z-index:2; pointer-events:none; }
  video { display:none; }
  #status {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    font-family:monospace; font-size:11px; color:#06b6d4;
    text-shadow:0 0 6px rgba(6,182,212,0.8); z-index:3;
    white-space:nowrap; pointer-events:none;
  }
  #load-status {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:monospace; font-size:12px; color:#06b6d4; text-align:center;
    text-shadow:0 0 8px rgba(6,182,212,0.8); z-index:4; pointer-events:none;
  }
</style>
</head><body>
<video id="video" playsinline muted autoplay></video>
<canvas id="video-canvas"></canvas>
<canvas id="overlay-canvas"></canvas>
<div id="status">INITIALIZING...</div>
<div id="load-status">LOADING BIOMETRIC SCANNER<br><span id="load-sub" style="font-size:10px;color:#94a3b8;"></span></div>
<script type="module">
// All files are bundled locally in assets/models/ — no CDN needed, instant load
const params = new URLSearchParams(location.search);
const GESTURE = (params.get('gesture') || 'WAVE').toUpperCase();
const REQUIRED = parseInt(params.get('frames') || '35');
const IS_PRELOAD = params.get('preload') === '1';

// Resolve local paths using chrome.runtime
function localUrl(path) {
  // camera.html is at extension root, so assets/models/ is relative
  return new URL(`assets/models/${path}`, location.href).href;
}

const video = document.getElementById('video');
const vc = document.getElementById('video-canvas');
const oc = document.getElementById('overlay-canvas');
const vctx = vc.getContext('2d');
const octx = oc.getContext('2d');
const statusEl = document.getElementById('status');
const loadEl = document.getElementById('load-status');
const loadSubEl = document.getElementById('load-sub');

let stream = null;
let running = false;
let accumulated = 0;
let frameCount = 0;
let scanLineY = 0;
let poseLandmarker = null;
let handLandmarker = null;
let drawUtils = null;
let useMediaPipe = false; // falls back to pixel-diff if MediaPipe fails

// ──────────────────────────────────────────────
// MEDIAPIPE INIT (fully local, no CDN)
// ──────────────────────────────────────────────
async function initMediaPipe() {
  try {
    loadSubEl.textContent = 'Loading vision bundle...';
    const { PoseLandmarker, HandLandmarker, FilesetResolver, DrawingUtils } =
      await import(localUrl('vision_bundle.mjs'));

    loadSubEl.textContent = 'Resolving WASM...';
    const vision = await FilesetResolver.forVisionTasks(
      // Point to local wasm folder
      new URL('assets/models', location.href).href
    );

    loadSubEl.textContent = 'Loading PoseLandmarker...';
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: localUrl('pose_landmarker_lite.task'),
        delegate: 'GPU'
      },
      runningMode: 'VIDEO',
      numPoses: 1
    });

    loadSubEl.textContent = 'Loading HandLandmarker...';
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: localUrl('hand_landmarker.task'),
        delegate: 'GPU'
      },
      runningMode: 'VIDEO',
      numHands: 2
    });

    drawUtils = new DrawingUtils(octx);
    useMediaPipe = true;
    window._PoseLandmarker = PoseLandmarker;
    window._HandLandmarker = HandLandmarker;
    loadSubEl.textContent = 'Ready!';
    return true;
  } catch (err) {
    console.warn('MediaPipe failed, using pixel-diff fallback:', err);
    loadSubEl.textContent = 'Using motion detection fallback';
    useMediaPipe = false;
    return false;
  }
}

// ──────────────────────────────────────────────
// MEDIAPIPE GESTURE EVALUATION
// ──────────────────────────────────────────────
function evaluateGestureMP(gesture, poseResults, handResults) {
  const pl = poseResults?.landmarks?.[0];
  const hl = handResults?.landmarks;
  const g = gesture;

  if (g.includes('WAVE') || g.includes('HAND')) {
    if (hl?.length > 0 && pl) {
      const wrist = hl[0][0];
      const hip = pl[24];
      return wrist.y < hip.y ? 1 : 0;
    }
    return 0;
  }
  if (g.includes('SALUTE')) {
    if (hl?.length > 0 && pl) {
      const wrist = hl[0][0], nose = pl[0];
      const d = Math.hypot(wrist.x - nose.x, wrist.y - nose.y);
      return d < 0.22 && wrist.y < nose.y + 0.12 ? 1 : 0;
    }
    return 0;
  }
  if (g.includes('THUMBS')) {
    if (hl?.length > 0) {
      const tip = hl[0][4], ip = hl[0][3];
      const idx = hl[0][8], mid = hl[0][12];
      return tip.y < ip.y && idx.y > hl[0][6].y && mid.y > hl[0][10].y ? 1 : 0;
    }
    return 0;
  }
  if (g.includes('CLAP')) {
    if (hl?.length >= 2) {
      const d = Math.hypot(hl[0][0].x - hl[1][0].x, hl[0][0].y - hl[1][0].y);
      return d < 0.18 ? 1 : 0;
    }
    return 0;
  }
  if (g.includes('NOD') || g.includes('HEAD')) {
    return pl ? 0.8 : 0; // head present = credit
  }
  if (g.includes('JUMPING JACKS')) {
    if (pl) {
      const lw = pl[15], rw = pl[16], ls = pl[11], rs = pl[12];
      return lw.y < ls.y && rw.y < rs.y ? 1 : 0.2;
    }
    return 0;
  }
  if (g.includes('SQUAT')) {
    if (pl) {
      const hip = pl[24], knee = pl[26];
      return hip.y > knee.y - 0.05 ? 1 : 0.2;
    }
    return 0;
  }
  if (g.includes('ARM CIRCLES') || g.includes('HELICOPTER')) {
    if (pl) {
      const lw = pl[15], rs = pl[12];
      return Math.hypot(lw.x - rs.x, lw.y - rs.y) > 0.3 ? 1 : 0.2;
    }
    return 0;
  }
  if (g.includes('MARCH')) {
    if (pl) {
      const lk = pl[25], rk = pl[26];
      // Knees should be alternating high
      return Math.abs(lk.y - rk.y) > 0.05 ? 1 : 0.3;
    }
    return 0;
  }
  // Generic: any pose or hand detected
  return (hl?.length > 0 ? 0.6 : 0) + (pl ? 0.4 : 0);
}

// ──────────────────────────────────────────────
// PIXEL-DIFF FALLBACK (zone-based)
// ──────────────────────────────────────────────
let prevData = null;
function zoneMotion(data, zone, w, h, T = 30) {
  if (!prevData) return 0;
  const x1=Math.floor(zone.x1*w), y1=Math.floor(zone.y1*h);
  const x2=Math.floor(zone.x2*w), y2=Math.floor(zone.y2*h);
  let changed=0, total=0;
  for (let y=y1; y<y2; y+=2) for (let x=x1; x<x2; x+=2) {
    const i=(y*w+x)*4;
    if (Math.abs(data[i]-prevData[i])+Math.abs(data[i+1]-prevData[i+1])+Math.abs(data[i+2]-prevData[i+2])>T) changed++;
    total++;
  }
  return total>0?changed/total:0;
}
const Z = {
  upper:{x1:.1,y1:0,x2:.9,y2:.45}, lower:{x1:.1,y1:.55,x2:.9,y2:1},
  left:{x1:0,y1:.1,x2:.45,y2:.9},  right:{x1:.55,y1:.1,x2:1,y2:.9},
  topL:{x1:0,y1:0,x2:.5,y2:.5},    topR:{x1:.5,y1:0,x2:1,y2:.5},
};
function evaluateGesturePD(imageData, w, h) {
  const d=imageData.data, g=GESTURE;
  const up=zoneMotion(d,Z.upper,w,h), lo=zoneMotion(d,Z.lower,w,h);
  const le=zoneMotion(d,Z.left,w,h), ri=zoneMotion(d,Z.right,w,h);
  const tL=zoneMotion(d,Z.topL,w,h), tR=zoneMotion(d,Z.topR,w,h);
  if (g.includes('WAVE')||g.includes('HAND')) return up>.06&&(le>.05||ri>.05)?1:up>.04?.5:0;
  if (g.includes('SALUTE')) return up>.05&&(tL>.04||tR>.04)?1:0;
  if (g.includes('CLAP')) return le>.05&&ri>.05?1:up>.08?.5:0;
  if (g.includes('THUMBS')) return (tL>.06||tR>.06)&&up>.04?1:up>.05?.4:0;
  if (g.includes('NOD')||g.includes('HEAD')) return up>.04?1:0;
  if (g.includes('JUMPING JACKS')) return tL+tR+lo>.18&&up>.06?1:up>.05?.4:0;
  if (g.includes('SQUAT')) return lo>.08?1:lo>.05?.5:0;
  if (g.includes('ARM CIRCLES')||g.includes('HELICOPTER')) return (le>.07||ri>.07)&&up>.04?1:up>.06?.4:0;
  if (g.includes('MARCH')) return lo>.06?1:lo>.03?.4:0;
  return up+lo>.10?1:up+lo>.05?.5:0;
}

// ──────────────────────────────────────────────
// SCANNER OVERLAY DRAWING
// ──────────────────────────────────────────────
function drawScannerOverlay(w, h, motionScore, poseResults, handResults) {
  octx.clearRect(0, 0, w, h);

  // Scanline sweep
  scanLineY = (scanLineY + 3) % h;
  const grad = octx.createLinearGradient(0, scanLineY-20, 0, scanLineY+20);
  grad.addColorStop(0, 'rgba(6,182,212,0)');
  grad.addColorStop(0.5, `rgba(6,182,212,${0.1 + motionScore * 0.15})`);
  grad.addColorStop(1, 'rgba(6,182,212,0)');
  octx.fillStyle = grad;
  octx.fillRect(0, scanLineY-20, w, 40);

  // Corner brackets
  const bS=30, bW=3;
  octx.strokeStyle = motionScore > 0.5 ? '#10b981' : '#06b6d4';
  octx.lineWidth = bW;
  for (const [x,y,dx,dy] of [[0,0,1,1],[w,0,-1,1],[0,h,1,-1],[w,h,-1,-1]]) {
    octx.beginPath();
    octx.moveTo(x+dx*bS, y); octx.lineTo(x, y); octx.lineTo(x, y+dy*bS);
    octx.stroke();
  }

  // Draw MediaPipe skeleton if available
  if (useMediaPipe && drawUtils) {
    const PL = window._PoseLandmarker;
    const HL = window._HandLandmarker;
    if (poseResults?.landmarks) {
      for (const lm of poseResults.landmarks) {
        const m = lm.map(l => ({ ...l, x: 1 - l.x })); // mirror
        drawUtils.drawConnectors(m, PL.POSE_CONNECTIONS,
          { color: '#00FF6680', lineWidth: 2 });
        drawUtils.drawLandmarks(m,
          { color: '#FF404080', fillColor: '#00FF6640', radius: 3, lineWidth: 1 });
      }
    }
    if (handResults?.landmarks) {
      for (const lm of handResults.landmarks) {
        const m = lm.map(l => ({ ...l, x: 1 - l.x }));
        drawUtils.drawConnectors(m, HL.HAND_CONNECTIONS,
          { color: '#06B6D480', lineWidth: 2 });
        drawUtils.drawLandmarks(m,
          { color: '#FF2D2D80', fillColor: '#06B6D440', radius: 2, lineWidth: 1 });
      }
    }
  } else {
    // Fallback: fake pulsing landmark dots
    frameCount++;
    if (motionScore > 0.3) {
      const pts = [[w*.5,h*.15],[w*.5,h*.3],[w*.3,h*.25],[w*.7,h*.25],
                   [w*.25,h*.45],[w*.75,h*.45],[w*.5,h*.5]];
      octx.strokeStyle='#10b98160'; octx.lineWidth=1;
      for (let i=0;i<pts.length-1;i++) {
        octx.beginPath(); octx.moveTo(pts[i][0],pts[i][1]);
        octx.lineTo(pts[i+1][0],pts[i+1][1]); octx.stroke();
      }
      pts.forEach(([x,y]) => {
        octx.beginPath(); octx.arc(x,y,4,0,Math.PI*2);
        octx.fillStyle='#10b981cc'; octx.fill();
      });
    }
  }

  // REC dot
  if (Math.floor(frameCount/20)%2===0) {
    octx.beginPath(); octx.arc(w-16,14,5,0,Math.PI*2);
    octx.fillStyle='#ff2d2d'; octx.fill();
    octx.fillStyle='#fff'; octx.font='10px monospace';
    octx.fillText('REC', w-38, 18);
  }
}

// ──────────────────────────────────────────────
// MAIN LOOP
// ──────────────────────────────────────────────
let lastTimestamp = 0;
function loop() {
  if (!running) return;
  requestAnimationFrame(loop);

  const now = performance.now();
  if (now - lastTimestamp < 33) return; // cap at ~30fps
  lastTimestamp = now;

  const w = vc.width, h = vc.height;
  vctx.save(); vctx.translate(w, 0); vctx.scale(-1, 1);
  vctx.drawImage(video, 0, 0, w, h);
  vctx.restore();

  let motionScore = 0;
  let poseResults = null, handResults = null;

  if (useMediaPipe) {
    try {
      poseResults = poseLandmarker.detectForVideo(video, now);
      handResults = handLandmarker.detectForVideo(video, now);
      motionScore = evaluateGestureMP(GESTURE, poseResults, handResults);
    } catch (_) {}
  } else {
    const imageData = vctx.getImageData(0, 0, w, h);
    motionScore = evaluateGesturePD(imageData, w, h);
    prevData = imageData.data.slice();
  }

  if (motionScore > 0) accumulated += motionScore;

  drawScannerOverlay(w, h, motionScore, poseResults, handResults);
  frameCount++;

  const progress = Math.min(accumulated / REQUIRED, 1);
  statusEl.textContent = motionScore > 0
    ? `${useMediaPipe ? '🦴 SKELETON' : '📡 MOTION'} DETECTED — ${Math.round(progress*100)}%`
    : `Perform: ${GESTURE}`;

  parent.postMessage({
    event: 'progress', value: progress,
    detected: motionScore > 0,
    hasPose: useMediaPipe ? !!(poseResults?.landmarks?.length) : motionScore > 0.5,
    hasHands: useMediaPipe ? !!(handResults?.landmarks?.length) : motionScore > 0.3,
    score: accumulated,
    gestureScore: motionScore,
    mode: useMediaPipe ? 'mediapipe' : 'pixeldiff'
  }, '*');

  if (progress >= 1) {
    running = false;
    parent.postMessage({ event: 'complete' }, '*');
    if (stream) stream.getTracks().forEach(t => t.stop());
  }
}

async function start() {
  if (IS_PRELOAD) return; // Just a warm-up ping, don't actually start camera

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width:640, height:480, facingMode:'user' }, audio:false
    });
    video.srcObject = stream;
    await video.play();
    vc.width = oc.width = video.videoWidth || 640;
    vc.height = oc.height = video.videoHeight || 480;
    loadEl.style.display = 'none';
    running = true;
    parent.postMessage({ event:'camera-started', mediapipe: useMediaPipe }, '*');
    loop();
  } catch(e) {
    parent.postMessage({ event:'camera-error', message: e.message }, '*');
  }
}

// Initialize MediaPipe from local files, then wait for start command
async function init() {
  if (!IS_PRELOAD) {
    loadSubEl.textContent = 'Initializing...';
    await initMediaPipe();
  }
  parent.postMessage({ event: 'ready', mediapipe: useMediaPipe }, '*');
}

window.addEventListener('message', e => {
  if (e.data?.cmd === 'start') start();
  if (e.data?.cmd === 'stop') {
    running = false;
    if (stream) stream.getTracks().forEach(t => t.stop());
  }
});

init();
</script>
</body></html>
